{% extends "base.html" %}
{% block title %}{{ acao }} Usuário{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>{{ acao }} Usuário</h1>
        <p>{{ "Preencha os dados para cadastrar um novo usuário." if acao == 'Novo' else "Atualize os dados do usuário." }}</p>
    </div>
    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline">← Voltar</a>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-header"><h2>👤 Dados do Usuário</h2></div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" name="nome"
                       value="{{ usuario.nome if usuario else '' }}"
                       placeholder="Nome do aluno, professor ou coordenador" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">E-mail *</label>
                    <input type="email" id="email" name="email"
                           value="{{ usuario.email if usuario else '' }}"
                           placeholder="email@senac.br" required>
                </div>
                <div class="form-group">
                    <label for="turma">Turma</label>
                    <input type="text" id="turma" name="turma"
                           value="{{ usuario.turma if usuario else '' }}"
                           placeholder="Ex.: ADS-2025-M">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="perfil">Perfil *</label>
                    <select id="perfil" name="perfil">
                        <option value="aluno"     {{ 'selected' if not usuario or usuario.perfil == 'aluno' }}>Aluno</option>
                        <option value="professor" {{ 'selected' if usuario and usuario.perfil == 'professor' }}>Professor</option>
                        <option value="admin"     {{ 'selected' if usuario and usuario.perfil == 'admin' }}>Administrador</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="senha">Senha {{ '(deixe em branco para manter)' if acao == 'Editar' else '*' }}</label>
                    <input type="password" id="senha" name="senha"
                           placeholder="{{ 'Nova senha (opcional)' if acao == 'Editar' else 'Senha de acesso' }}"
                           {{ '' if acao == 'Editar' else 'required' }}>
                </div>
            </div>

            <div style="display:flex; gap:.75rem; justify-content:flex-end; margin-top:1rem;">
                <a href="{{ url_for('admin.dashboard') }}" class="btn btn-outline">Cancelar</a>
                <button type="submit" class="btn btn-laranja">
                    {{ "➕ Cadastrar Usuário" if acao == 'Novo' else "💾 Salvar Alterações" }}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
